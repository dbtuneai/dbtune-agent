repos:
  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        entry: bash -c 'out=$(gofmt -l .); if [ -n "$out" ]; then gofmt -w .; echo "Formatted files:"; echo "$out"; exit 1; fi'
        language: system
        types: [go]
        pass_filenames: false
      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        types: [go]
        pass_filenames: false
      - id: go-test-compile
        name: go test compile
        entry: go test -run=^$ ./...
        language: system
        types: [go]
        pass_filenames: false
