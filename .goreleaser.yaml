version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/agent.go
    binary: dbtune-agent
    ldflags:
      - -s -w
      - -X github.com/dbtuneai/agent/pkg/version.Version={{.Version}}
      - -X github.com/dbtuneai/agent/pkg/version.Commit={{.Commit}}
      - -X github.com/dbtuneai/agent/pkg/version.Date={{.Date}}
    ignore:
      - goos: darwin
        goarch: amd64

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github

  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"

  groups:
    - title: "🚀 Features"
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: "🧰 Maintenance"
      regexp: "^.*chore[(\\w)]*:+.*$"
      order: 2
    - title: "📝 Documentation"
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 3
    - title: Other
      order: 999

announce:
  slack:
    enabled: true
    message_template: "🚀 new DBtune Agent {{.Tag}} release. [Changelog]({{.ReleaseURL}})"
    channel: "testingbot"
    username: "Platform release"
